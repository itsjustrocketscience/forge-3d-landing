<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge 3D // Laser Cutting</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="central-container">
        <nav class="navbar">
            <a href="index.html" class="nav-logo">Forge 3D</a>
            <ul class="nav-links">
                <li><a href="index.html">Hub</a></li>
                <li><a href="printing.html">3D Print</a></li>
                <li><a href="laser.html" class="active">Laser</a></li>
                <li><a href="modeling-3d.html">3D CAD</a></li>
                <li><a href="modeling-2d.html">2D CAD</a></li>
            </ul>
        </nav>

        <section class="card form-section">
            <h2>Laser Cutting Processing [40W Module]</h2>
            <p class="form-subtitle">Upload flat engineering layouts for precise material cut sheets.</p>
            
            <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="access_key" value="60244860-342f-433a-b18b-185693dde8d4">
                <input type="hidden" name="subject" value="Forge 3D: New Laser Task">
                <input type="checkbox" name="botcheck" style="display: none;">

                <div class="input-row">
                    <div class="input-group"><label>Name</label><input type="text" name="operator_name" required></div>
                    <div class="input-group"><label>Material Stock Thickness</label><input type="text" name="material_thickness" placeholder="e.g., 3mm Acrylic, 1/8 balsa wood" required></div>
                </div>
                <div class="input-group"><label>Cut Schema Parameters</label><textarea name="parameter_overrides" rows="3" placeholder="Identify internal vector line colors vs external perimeter cuts..."></textarea></div>
                <div class="input-row">
                    <div class="input-group"><label>Attach Vector File (.dxf)</label><div class="file-input-wrapper"><input type="file" name="cad_vector_file" accept=".dxf" required></div></div>
                    <div class="input-group"><label>Payment Verification</label><input type="text" name="transaction_verification" required placeholder="Zelle or 'IOU'"></div>
                </div>
                <button type="submit" class="submit-btn">Transmit Laser Cuts</button>
            </form>
        </section>
    </div>
</body>
</html>
