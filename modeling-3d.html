<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge 3D // 3D Modeling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="central-container">
        <nav class="navbar">
            <a href="index.html" class="nav-logo">Forge 3D</a>
            <ul class="nav-links">
                <li><a href="index.html">Hub</a></li>
                <li><a href="printing.html">3D Print</a></li>
                <li><a href="laser.html">Laser</a></li>
                <li><a href="modeling-3d.html" class="active">3D CAD</a></li>
                <li><a href="modeling-2d.html">2D CAD</a></li>
            </ul>
        </nav>

      <section class="card form-section">
            <h2>3D Modeling & Parametric CAD Design [Autodesk Fusion]</h2>
            <p class="form-subtitle">Request custom components designed from physical descriptions or constraint limits.</p>
            
            <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="access_key" value="60244860-342f-433a-b18b-185693dde8d4">
                <input type="hidden" name="subject" value="Forge 3D: New 3D Modeling Job">
                <input type="checkbox" name="botcheck" style="display: none;">

                <div class="input-row">
                    <div class="input-group"><label for="name">Name</label><input type="text" id="name" name="operator_name" required placeholder="Your Name"></div>
                    <div class="input-group">
                        <label for="event">Target Event</label>
                        <select id="event" name="target_event" required>
                            <option value="" disabled selected>Select your event...</option>
                            <option value="Roller Coaster">Roller Coaster</option>
                            <option value="Scrambler">Scrambler</option>
                            <option value="Boomilever">Boomilever</option>
                            <option value="Ping Pong Parachute">Ping Pong Parachute</option>
                            <option value="Hovercraft">Hovercraft</option>
                            <option value="Elastic Launched Glider">Elastic Launched Glider</option>
                        </select>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="specs">Geometric & Physical Constraints</label>
                    <textarea id="specs" name="parameter_overrides" rows="5" required placeholder="Specify your envelope dimensions, shaft diameters, bolt circles, or mating faces..."></textarea>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label style="display: flex; justify-content: space-between; align-items: center;">
                            <span>Upload Dimension Sketch / Photo</span>
                            <span style="color: #22c55e; font-size: 0.75rem; font-weight: bold;">[ 3% DISCOUNT IF ATTACHED ]</span>
                        </label>
                        <div class="file-input-wrapper" style="border-color: rgba(34, 197, 94, 0.4);">
                            <input type="file" id="file" name="cad_vector_file" accept="image/*,.pdf">
                        </div>
                        <small>Optional: Attach a blueprint, hand-drawn sketch, or photo reference to claim your discount.</small>
                    </div>

                    <div class="input-group">
                        <label for="payment">Payment Verification</label>
                        <input type="text" id="payment" name="transaction_verification" required placeholder="Zelle name or 'IOU'">
                    </div>
                </div>
                <button type="submit" class="submit-btn">Initiate CAD Design Pipeline</button>
            </form>
        </section>
    </div>
</body>
</html>
