<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge 3D // 3D Modeling</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="central-container">
        <nav class="navbar">
            <a href="index.html" class="nav-logo">Forge 3D</a>
            <ul class="nav-links">
                <li><a href="index.html">Hub</a></li>
                <li><a href="printing.html">3D Print</a></li>
                <li><a href="laser.html">Laser</a></li>
                <li><a href="modeling-3d.html" class="active">3D CAD</a></li>
                <li><a href="modeling-2d.html">2D CAD</a></li>
            </ul>
        </nav>

        <section class="card form-section">
            <h2>3D Modeling & Parametric CAD Design [Autodesk Fusion]</h2>
            <p class="form-subtitle">Request custom components designed from physical descriptions or constraint limits.</p>
            
            <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="access_key" value="60244860-342f-433a-b18b-185693dde8d4">
                <input type="hidden" name="subject" value="Forge 3D: New 3D Modeling Job">
                <input type="checkbox" name="botcheck" style="display: none;">

                <div class="input-row">
                    <div class="input-group"><label>Name</label><input type="text" name="operator_name" required></div>
                    <div class="input-group">
                        <label>Target Event</label>
                        <select name="target_event" required>
                            <option value="Roller Coaster">Roller Coaster</option>
                            <option value="Scrambler">Scrambler</option>
                            <option value="Boomilever">Boomilever</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="input-group"><label>Geometric & Physical Constraints</label><textarea name="parameter_overrides" rows="5" required placeholder="Specify your envelope dimensions, shaft diameters, bolt circles, or mating faces..."></textarea></div>
                <div class="input-row">
                    <div class="input-group"><label>Upload Dimension Sketch / Photo</label><div class="file-input-wrapper"><input type="file" name="cad_vector_file" accept="image/*,.pdf" required></div></div>
                    <div class="input-group"><label>Payment Verification</label><input type="text" name="transaction_verification" required placeholder="Zelle or 'IOU'"></div>
                </div>
                <button type="submit" class="submit-btn">Initiate CAD Design Pipeline</button>
            </form>
        </section>
    </div>
</body>
</html>
